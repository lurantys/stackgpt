name: Package extension
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd extension && zip -r stackgpt-extension.zip . -x "newicon.png"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: extension/stackgpt-extension.zip
          make_latest: true
          fail_on_unmatched_files: false
