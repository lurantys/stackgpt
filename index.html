<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackGPT — Save chat snippets across AI platforms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="extension/icon128.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #111827;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Navigation --- */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25em 2.5em;
      background: rgba(250,250,250,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.5rem; font-weight: 700; color: #111827;
      display: flex; align-items: center; gap: 0.6em;
    }
    .nav-logo img { width: 36px; height: 36px; border-radius: 8px; pointer-events: none; }
    .nav-cta {
      font-size: 0.875rem; font-weight: 600;
      padding: 0.6em 1.5em;
      border-radius: 100px;
      background: #2d7d63;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* --- Hero --- */
    main {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 7em 2em 2em;
      text-align: center;
    }
    .hero-content {
      max-width: 800px;
      width: 100%;
    }
    h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #111827;
      margin-bottom: 0.5em;
    }
    h1 .highlight-green { color: #2d7d63; }
    h1 .highlight-serif { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; color: #111827; }
    .subheadline {
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      font-weight: 400;
      color: #6b7280;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto 2em;
    }
    .cta-group {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 1em; margin-bottom: 0.75em;
    }
    .cta-primary {
      font-size: 1rem; font-weight: 600;
      padding: 0.85em 2.2em;
      border-radius: 100px;
      border: none;
      background: #111827;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .cta-primary:hover { opacity: 0.8; }
    .cta-secondary {
      font-size: 1rem; font-weight: 600;
      padding: 0.85em 2.2em;
      border-radius: 100px;
      border: 1.5px solid #d1d5db;
      background: transparent;
      color: #111827;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .cta-secondary:hover { border-color: #2d7d63; color: #2d7d63; background: #f0fdf9; }
    .micro-copy {
      font-size: 0.8rem; font-style: italic;
      color: #9ca3af;
      margin-bottom: 3em;
    }

    /* --- Preview Card --- */
    .preview-section {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1em;
    }
    .preview-card {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.04);
      background: #e5e7eb;
      transition: transform 0.3s ease;
    }
    .preview-card:hover { transform: translateY(-4px); }
    .preview-card video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      nav { padding: 1em 1.25em; }
      .nav-cta { font-size: 0.8rem; padding: 0.5em 1.2em; }
      h1 { letter-spacing: -0.02em; }
      .cta-primary, .cta-secondary { font-size: 0.9rem; padding: 0.75em 1.6em; }
      .preview-card { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">
      <img src="extension/icon48.png" alt="">
      StackGPT
    </div>
    <a href="https://github.com/lurantys/stackgpt/releases/download/latest/stackgpt-extension.zip" class="nav-cta">Get the Extension</a>
  </nav>

  <main>
    <div class="hero-content">
      <h1>
        Never lose a good <span class="highlight-green">chat</span> again.<br>
        Save snippets across <span class="highlight-serif">every</span> AI platform.
      </h1>
      <p class="subheadline">
        Save, organize, and copy chat snippets across ChatGPT, Claude, Gemini, and Grok — all from one sidebar.
      </p>
      <div class="cta-group">
        <a href="https://github.com/lurantys/stackgpt/releases/download/latest/stackgpt-extension.zip" class="cta-primary">Download for Chrome</a>
        <a href="https://github.com/lurantys/stackgpt" class="cta-secondary" target="_blank">View on GitHub</a>
      </div>
      <p class="micro-copy">(no sign-up required!)</p>
    </div>

    <div class="preview-section">
      <div class="preview-card">
        <video src="demo.mp4" poster="demoscreen-resized.png" autoplay muted loop playsinline></video>
      </div>
    </div>
  </main>


</body>
</html>
