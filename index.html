<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StackGPT — Save chat snippets across AI platforms</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="icon128.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #1a1a2e;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Navigation --- */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25em 2.5em;
      background: rgba(250,250,250,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }
    .nav-logo {
      font-size: 1.25rem; font-weight: 700; color: #1a1a2e;
      display: flex; align-items: center; gap: 0.5em;
      text-decoration: none;
    }
    .nav-logo img { width: 28px; height: 28px; border-radius: 6px; }
    .nav-cta {
      font-size: 0.875rem; font-weight: 600;
      padding: 0.6em 1.5em;
      border-radius: 100px;
      border: 1.5px solid #1a1a2e;
      background: transparent;
      color: #1a1a2e;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
    }
    .nav-cta:hover { background: #1a1a2e; color: #fafafa; }

    /* --- Hero --- */
    main {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 7em 2em 2em;
      text-align: center;
    }
    .hero-content {
      max-width: 800px;
      width: 100%;
    }
    h1 {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #1a1a2e;
      margin-bottom: 0.5em;
    }
    h1 .highlight-red { color: #e63946; }
    h1 .highlight-serif { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; }
    .subheadline {
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      font-weight: 400;
      color: #6b7280;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto 2em;
    }
    .cta-group {
      display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
      gap: 1em; margin-bottom: 0.75em;
    }
    .cta-primary {
      font-size: 1rem; font-weight: 600;
      padding: 0.85em 2.2em;
      border-radius: 100px;
      border: none;
      background: #1a1a2e;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .cta-primary:hover { opacity: 0.85; }
    .cta-secondary {
      font-size: 1rem; font-weight: 600;
      padding: 0.85em 2.2em;
      border-radius: 100px;
      border: 1.5px solid #d1d5db;
      background: transparent;
      color: #1a1a2e;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-decoration: none;
    }
    .cta-secondary:hover { border-color: #1a1a2e; background: #f3f4f6; }
    .micro-copy {
      font-size: 0.8rem; font-style: italic;
      color: #9ca3af;
      margin-bottom: 3em;
    }

    /* --- Preview Card --- */
    .preview-section {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 1em;
    }
    .preview-card {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.04);
      background: #e5e7eb;
      transition: transform 0.3s ease;
    }
    .preview-card:hover { transform: translateY(-4px); }
    .preview-card img,
    .preview-card video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* --- Footer Badge --- */
    .made-in-badge {
      position: fixed; bottom: 1.5em; right: 1.5em;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; font-weight: 500;
      color: #9ca3af;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0.5em 1em;
      border-radius: 100px;
      border: 1px solid #e5e7eb;
      z-index: 100;
      text-decoration: none;
    }
    .made-in-badge svg { width: 14px; height: 14px; }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      nav { padding: 1em 1.25em; }
      .nav-cta { font-size: 0.8rem; padding: 0.5em 1.2em; }
      h1 { letter-spacing: -0.02em; }
      .cta-primary, .cta-secondary { font-size: 0.9rem; padding: 0.75em 1.6em; }
      .preview-card { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <img src="icon48.png" alt="StackGPT">
      StackGPT
    </a>
    <a href="https://github.com/lurantys/stackgpt" class="nav-cta" target="_blank">Get the Extension</a>
  </nav>

  <main>
    <div class="hero-content">
      <h1>
        Stop running <span class="highlight-red">ads</span>.<br>
        Your snippets aren't that <span class="highlight-serif">sketchy</span>.
      </h1>
      <p class="subheadline">
        Save, organize, and copy chat snippets across ChatGPT, Claude, Gemini, and Grok — all from one sidebar.
      </p>
      <div class="cta-group">
        <a href="https://github.com/lurantys/stackgpt/releases" class="cta-primary" target="_blank">Download for Chrome</a>
        <a href="https://github.com/lurantys/stackgpt" class="cta-secondary" target="_blank">View on GitHub</a>
      </div>
      <p class="micro-copy">(no sign-up required!)</p>
    </div>

    <div class="preview-section">
      <div class="preview-card">
        <img src="demo.gif" alt="StackGPT demo">
      </div>
    </div>
  </main>

  <a href="https://framer.com" target="_blank" class="made-in-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
    </svg>
    Made in Framer
  </a>
</body>
</html>
